[pytest]
# Configuración de pytest para el proyecto

# ==================== RUTAS Y DESCUBRIMIENTO ====================
# Directorio raíz donde pytest buscará tests
testpaths = backend/tests

# Patrón para descubrir archivos de test
python_files = test_*.py *_test.py

# Patrón para clases de test
python_classes = Test*

# Patrón para funciones de test
python_functions = test_*

# ==================== ASYNCIO ====================
# Configuración para tests asíncronos
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# ==================== MARKERS ====================
# Definir markers personalizados para organizar tests
markers =
    unit: Tests unitarios (sin dependencias externas)
    integration: Tests de integración (usan BD real)
    slow: Tests lentos que pueden tardar más de 1 segundo
    smoke: Tests básicos de smoke testing
    repository: Tests de capa de persistencia
    use_case: Tests de casos de uso
    database: Tests que requieren conexión a base de datos
    live: tests que llaman APIs reales (no se ejecutan por defecto)
    e2e: end-to-end tests live (más lentos y frágiles)

# ==================== OUTPUT ====================
# Mostrar output detallado
addopts = 
    -v
    -q -m "not live"
    --strict-markers
    --tb=short
    --cov=backend
    --cov-report=term-missing
    --cov-report=html
    -W ignore::DeprecationWarning

# ==================== LOGGING ====================
# Configuración de logs durante tests
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# ==================== WARNINGS ====================
# Filtros para warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning

# ==================== PYTHON PATH ====================
# Añadir el directorio raíz al PYTHONPATH
pythonpath = .
