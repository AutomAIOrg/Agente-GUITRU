name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install ruff basedpyright pytest
          pip install -r requirements.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .
      
      - name: Type check (basedpyright)
        run: basedpyright --project backend/pyproject.toml

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Unit tests
        run: pytest backend/tests/unit

  integration-tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0.45
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.CI_DB_ROOT_PASS || 'ci_root_pass' }}
          MYSQL_DATABASE: agente_guitru
          MYSQL_USER: ${{ secrets.CI_DB_USER || 'ci_user' }}
          MYSQL_PASSWORD: ${{ secrets.CI_DB_PASS || 'ci_pass' }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u${{ secrets.CI_DB_USER || 'ci_user' }} -p${{ secrets.CI_DB_PASS || 'ci_pass' }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: ${{ secrets.CI_DB_USER || 'ci_user' }}
      DB_PASS: ${{ secrets.CI_DB_PASS || 'ci_pass' }}
      DB_NAME: agente_guitru
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Integration tests
        run: pytest backend/tests/integration
